; =============================================================================
; RemoteID Mesh Detect — Dual-Band (C5) / Single-Band (S3)
; WiFi (2.4+5GHz) + BLE drone detection with Meshtastic UART relay
; =============================================================================

; --- XIAO ESP32-C5 (dual-band 2.4GHz + 5GHz WiFi 6) ---
[env:seeed_xiao_esp32c5]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.39/platform-espressif32.zip
board = seeed_xiao_esp32c5
framework = arduino

build_flags =
    -std=gnu++17
    -DCORE_DEBUG_LEVEL=0
    -DCONFIG_BT_NIMBLE_ENABLED=1
    -DCONFIG_BT_NIMBLE_EXT_ADV=1

upload_speed = 115200
monitor_speed = 115200

lib_deps =
    h2zero/NimBLE-Arduino@^2.1.0
    bblanchon/ArduinoJson@^7.0.4

; --- XIAO ESP32-S3 (single-band 2.4GHz, fallback) ---
[env:seeed_xiao_esp32s3]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.39/platform-espressif32.zip
board = seeed_xiao_esp32s3
framework = arduino

build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -DCONFIG_BT_NIMBLE_ENABLED=1
    -DCONFIG_BT_NIMBLE_EXT_ADV=1

upload_speed = 921600
monitor_speed = 115200

lib_deps =
    h2zero/NimBLE-Arduino@^2.1.0
    bblanchon/ArduinoJson@^7.0.4
